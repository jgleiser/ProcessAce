services:
  app:
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    ports:
      - '80:80'
      - '443:443'
    environment:
      - CADDY_HOST=${CADDY_HOST:?CADDY_HOST is required for the TLS overlay}
      - CADDY_EMAIL=${CADDY_EMAIL:?CADDY_EMAIL is required for the TLS overlay}
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
