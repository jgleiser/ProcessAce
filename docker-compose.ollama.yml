services:
  app:
    environment:
      - OLLAMA_BASE_URL_DEFAULT=http://ollama:11434/v1
      - OLLAMA_PULL_HOST=http://ollama:11434
    depends_on:
      - ollama

  ollama:
    image: ollama/ollama:latest
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama_data:
